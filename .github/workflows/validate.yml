name: Validate skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-skills.mjs
      - name: Check refactor-writing JavaScript syntax
        run: |
          node --check refactor-writing/scripts/render-report.mjs
          node --check refactor-writing/assets/report/artifact.js
      - name: Test refactor-writing renderer
        run: node --test tests/refactor-writing/*.test.mjs
